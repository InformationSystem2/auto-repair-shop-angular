<header class="h-14 flex items-center justify-between px-6
               bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border-b border-slate-200 dark:border-slate-700/50 shrink-0">

  <!-- Mobile Toggle -->
  <button 
    (click)="uiService.toggleSidebar()"
    class="lg:hidden p-2 -ml-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Page title (projected) -->
  <div class="flex-1 min-w-0 ml-4 sm:ml-0">
    <ng-content />
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-3">

    <!-- Dark Mode Toggle -->
    <button (click)="uiService.toggleDarkMode()"
      class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      [title]="uiService.darkMode() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
      @if (uiService.darkMode()) {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      }
    </button>

    <!-- Notification placeholder -->
    <button class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
    </button>

    <!-- Logout -->
    <button
      (click)="logout()"
      class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-400
             hover:text-red-400 hover:bg-red-500/10 border border-transparent
             hover:border-red-500/30 transition-all text-sm font-medium">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Salir
    </button>
  </div>
</header>
