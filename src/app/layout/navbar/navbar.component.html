<header class="h-16 flex items-center justify-between px-6
               bg-[#eff1f5]/60 dark:bg-[#1a1b26]/60 backdrop-blur-xl border-b border-white/50 dark:border-slate-800/80 shadow-sm shrink-0 transition-colors duration-300 relative z-10 w-full">

  <div class="absolute inset-x-0 bottom-0 h-[1px] bg-gradient-to-r from-transparent via-slate-200 dark:via-slate-800 to-transparent"></div>

  <!-- Mobile Toggle -->
  <button
    (click)="uiService.toggleSidebar()"
    class="lg:hidden p-2.5 -ml-3 rounded-xl text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-indigo-500/10 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Desktop Sidebar Toggle -->
  <button
    (click)="uiService.toggleDesktopSidebar()"
    class="hidden lg:flex p-2.5 -ml-3 rounded-xl text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-indigo-500/10 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500/50"
    [title]="uiService.desktopCollapsed() ? 'Mostrar menú' : 'Ocultar menú'">
    @if (uiService.desktopCollapsed()) {
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
      </svg>
    } @else {
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M19 19l-7-7 7-7" />
      </svg>
    }
  </button>

  <!-- Page title (projected) -->
  <div class="flex-1 min-w-0 ml-4 sm:ml-0 flex items-center">
    <ng-content />
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-3 sm:gap-4">

    <!-- Dark Mode Toggle -->
    <button (click)="uiService.toggleDarkMode()"
      class="p-2.5 rounded-full text-slate-500 hover:text-indigo-600 hover:bg-white dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500/50 border border-transparent hover:border-slate-200 dark:hover:border-slate-700"
      [title]="uiService.darkMode() ? i18n.translate('common.light_mode') : i18n.translate('common.dark_mode')">
      @if (uiService.darkMode()) {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      }
    </button>

    <!-- Language Toggle -->
    <button (click)="toggleLang()"
      class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-slate-500 hover:text-indigo-600 hover:bg-white dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500/50 border border-transparent hover:border-slate-200 dark:hover:border-slate-700 text-xs font-bold uppercase tracking-wider">
      <svg class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5c.413 2.893-1.028 5.799-3.501 7.74M4.5 9C4.5 9 5.59 14.988 11 17" />
      </svg>
      {{ i18n.currentLang() }}
    </button>

    <!-- Requests Link -->
    @if (canViewRequests()) {
      <a
        [routerLink]="'/app/requests'"
        (click)="notificationService.markAsRead(); uiService.closeSidebar()"
        class="relative p-2.5 rounded-full text-slate-500 hover:text-indigo-600 hover:bg-white dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500/50 border border-transparent hover:border-slate-200 dark:hover:border-slate-700"
        [title]="i18n.translate('nav.requests')">
        @if (notificationService.hasNewNotifications()) {
          <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-pink-500 border-2 border-white dark:border-[#1a1b26] rounded-full animate-pulse"></span>
        }
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
      </a>
    }

    <div class="w-px h-6 bg-slate-200 dark:bg-slate-800 hidden sm:block mx-1"></div>

    <!-- Logout -->
    <button
      (click)="logout()"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-slate-600 dark:text-slate-300
             hover:text-red-600 hover:bg-red-50 dark:hover:text-red-400 dark:hover:bg-red-500/10 border border-transparent
             hover:border-red-200 dark:hover:border-red-500/30 transition-all duration-300 text-sm font-bold group">
      <svg class="w-4.5 h-4.5 group-hover:subpixel-antialiased group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span class="hidden sm:block">{{ i18n.translate('nav.logout') }}</span>
    </button>
  </div>
</header>
