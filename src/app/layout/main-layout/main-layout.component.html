<div class="flex h-screen bg-slate-50 dark:bg-[#0B0F19] overflow-hidden relative">
  <!-- Premium ambient background -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100/40 via-white to-white dark:from-indigo-900/15 dark:via-[#0B0F19] dark:to-[#0B0F19] pointer-events-none z-0 transition-colors duration-1000"></div>

  <!-- Backdrop (Mobile only) -->
  @if (uiService.sidebarOpen()) {
    <div class="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md z-30 lg:hidden animate-in fade-in duration-300"
         (click)="uiService.closeSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <app-sidebar class="z-40" />

  <!-- Main area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden relative z-10 w-full">
    <app-navbar>
      <ng-content />
    </app-navbar>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-8">
      <router-outlet />
    </main>
  </div>
</div>
