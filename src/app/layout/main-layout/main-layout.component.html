<div class="flex h-screen bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
  <!-- Backdrop (Mobile only) -->
  @if (uiService.sidebarOpen()) {
    <div class="fixed inset-0 bg-slate-600/20 dark:bg-slate-950/60 backdrop-blur-sm z-30 lg:hidden animate-in fade-in duration-300"
         (click)="uiService.closeSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <app-sidebar class="z-40" />

  <!-- Main area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden relative">
    <app-navbar>
      <ng-content />
    </app-navbar>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6">
      <router-outlet />
    </main>
  </div>
</div>
