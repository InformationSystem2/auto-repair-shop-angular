<aside 
  class="flex flex-col h-full w-[17rem] bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-2xl border-r border-white/60 dark:border-slate-800/80 shadow-[4px_0_24px_rgba(0,0,0,0.02)] select-none fixed inset-y-0 left-0 lg:static transform transition-all duration-300 z-50 shrink-0"
  [class.-translate-x-full]="!uiService.sidebarOpen()"
  [class.translate-x-0]="uiService.sidebarOpen()"
  [class.lg:translate-x-0]="true">

  <!-- Brand (With Close button for mobile) -->
  <div class="flex items-center justify-between px-7 py-6 border-b border-slate-200/50 dark:border-slate-800/50">
    <div class="flex items-center gap-3">
      <div class="flex items-center justify-center w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 relative overflow-hidden group hover:scale-105 transition-transform cursor-pointer">
        <div class="absolute inset-0 bg-white/20 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-500"></div>
        <svg class="w-5 h-5 text-white relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div>
        <h1 class="text-slate-900 dark:text-white font-black text-lg tracking-tight leading-tight">Auxilio</h1>
        <p class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-500 dark:from-indigo-400 dark:to-purple-400 font-bold text-[0.65rem] uppercase tracking-widest">Mecánico</p>
      </div>
    </div>
    
    <!-- Mobile close button -->
    <button (click)="uiService.closeSidebar()" class="lg:hidden p-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-slate-500 hover:text-indigo-600 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
    <p class="px-3 mb-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Menú Principal</p>
    @for (item of visibleItems(); track item.route) {
      <a
        [routerLink]="item.route"
        (click)="uiService.closeSidebar()"
        routerLinkActive="bg-white dark:bg-slate-800 text-indigo-700 dark:text-indigo-300 shadow-sm border border-slate-200 dark:border-slate-700 shadow-slate-200/50"
        [routerLinkActiveOptions]="{ exact: false }"
        #rla="routerLinkActive"
        class="relative flex items-center gap-3.5 px-3 py-3 rounded-2xl text-slate-500 dark:text-slate-400 border border-transparent
               hover:bg-white/50 dark:hover:bg-slate-800/50 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-200 group cursor-pointer overflow-hidden font-medium">
        
        <!-- Active indicator pill -->
        @if (rla.isActive) {
          <div class="absolute left-0 inset-y-2 w-1 bg-indigo-500 rounded-r-full"></div>
        }

        <svg class="w-5 h-5 shrink-0 transition-transform duration-200 group-hover:scale-110" 
             [class]="rla.isActive ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
        </svg>
        <span class="text-sm tracking-wide">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User footer -->
  <div class="p-4 mx-4 mb-4 rounded-3xl bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-[1.25rem] bg-indigo-100 dark:bg-indigo-500/20 border border-indigo-200 dark:border-indigo-500/30 flex items-center justify-center text-indigo-700 dark:text-indigo-300 text-sm font-black shrink-0 relative">
        {{ initials() }}
        <span class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white dark:border-slate-800 rounded-full"></span>
      </div>
      <div class="flex-1 min-w-0 pr-1">
        <p class="text-slate-900 dark:text-white text-sm font-bold truncate">{{ userName() }}</p>
        <p class="text-indigo-600 dark:text-indigo-400 text-xs font-semibold truncate uppercase tracking-wider text-[0.65rem]">{{ roleName() }}</p>
      </div>
    </div>
  </div>
</aside>
