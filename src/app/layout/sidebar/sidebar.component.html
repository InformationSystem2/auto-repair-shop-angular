<aside 
  class="flex flex-col h-full w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700/50 select-none fixed inset-y-0 left-0 lg:static transform transition-transform duration-300 z-50 shrink-0"
  [class.-translate-x-full]="!uiService.sidebarOpen()"
  [class.translate-x-0]="uiService.sidebarOpen()"
  [class.lg:translate-x-0]="true">

  <!-- Brand (With Close button for mobile) -->
  <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 dark:border-slate-700/50">
    <div class="flex items-center gap-3">
      <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 shadow-lg shadow-indigo-500/30">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div>
        <p class="text-slate-900 dark:text-white font-bold text-sm leading-tight">Auxilio</p>
        <p class="text-indigo-600 dark:text-indigo-400 text-xs">Mecánico</p>
      </div>
    </div>
    
    <!-- Mobile close button -->
    <button (click)="uiService.closeSidebar()" class="lg:hidden p-1.5 text-slate-400 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of visibleItems(); track item.route) {
      <a
        [routerLink]="item.route"
        (click)="uiService.closeSidebar()"
        routerLinkActive="bg-indigo-600/10 dark:bg-indigo-600/20 text-indigo-600 dark:text-indigo-300 border-indigo-200 dark:border-indigo-500/50"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 dark:text-slate-400 border border-transparent
               hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all duration-150 group cursor-pointer">
        <svg class="w-5 h-5 shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
        </svg>
        <span class="text-sm font-medium">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User footer -->
  <div class="px-4 py-4 border-t border-slate-200 dark:border-slate-700/50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center text-white text-xs font-bold">
        {{ initials() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-slate-900 dark:text-white text-sm font-medium truncate">{{ userName() }}</p>
        <p class="text-slate-500 text-xs truncate">{{ roleName() }}</p>
      </div>
    </div>
  </div>
</aside>
