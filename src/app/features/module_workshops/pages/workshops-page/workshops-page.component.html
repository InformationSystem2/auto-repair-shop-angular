<div class="p-6 space-y-8 animate-in fade-in duration-700">
  
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 text-left">
    <div>
      <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">
        {{ i18n.translate('workshops.management_title') }}
      </h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">
        {{ i18n.translate('workshops.subtitle') }}
      </p>
    </div>

    <!-- Filters -->
    <app-workshops-filter 
      [current]="filterVerified()" 
      (changed)="filterVerified.set($event)">
    </app-workshops-filter>
  </div>

  <!-- Content -->
  <app-card class="bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/60 dark:border-slate-800/80 rounded-[2rem] shadow-xl shadow-slate-200/40 dark:shadow-none min-h-[400px] overflow-hidden p-0 mt-3" *ngIf="!loading()">
    <app-workshops-table 
      [workshops]="filteredWorkshops()" 
      (view)="onWorkshopSelect($event)"
      (verify)="verifyWorkshop($event)">
    </app-workshops-table>
  </app-card>

  <!-- Empty states -->
  <div *ngIf="!loading() && filteredWorkshops().length === 0" class="flex flex-col items-center justify-center py-20 text-center">
    <div class="w-16 h-16 rounded-3xl bg-slate-50 dark:bg-slate-900 flex items-center justify-center text-slate-300 mb-4 font-bold text-2xl">?</div>
    <h3 class="text-slate-800 dark:text-white font-bold">{{ i18n.translate('common.no_results') }}</h3>
    <p class="text-slate-500 text-sm">{{ i18n.translate('common.adjust_filters') }}</p>
  </div>

</div>
