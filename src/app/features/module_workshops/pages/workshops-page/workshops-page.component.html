<div class="p-6 md:p-8 max-w-7xl mx-auto animate-in fade-in duration-700 relative z-10" style="background-color: var(--ds-bg);">
  
  <!-- Header -->
  <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div>
      <h1 class="text-2xl font-bold" style="color: var(--ds-text);">
        {{ i18n.translate('workshops.management_title') }}
      </h1>
      <p class="text-sm mt-0.5" style="color: var(--ds-subtext);">
        {{ i18n.translate('workshops.subtitle') }}
      </p>
    </div>

    <!-- Filters -->
    <app-workshops-filter 
      [current]="filterVerified()" 
      (changed)="filterVerified.set($event)">
    </app-workshops-filter>
  </div>

  <!-- Content -->
  <div class="rounded-xl overflow-hidden shadow-2xl" 
       style="background-color: var(--ds-card); border: 1px solid var(--ds-border); box-shadow: 0 4px 20px var(--ds-shadow);" 
       *ngIf="!loading()">
    <app-workshops-table
      [workshops]="filteredWorkshops()"
      (view)="onWorkshopSelect($event)"
      (verify)="verifyWorkshop($event)"
      (clearCooldown)="clearCooldown($event)">
    </app-workshops-table>
  </div>

  <!-- Empty states -->
  @if (!loading() && filteredWorkshops().length === 0) {
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="w-16 h-16 rounded-xl flex items-center justify-center mb-4 font-bold text-xl opacity-20" style="background-color: var(--ds-surface0); color: var(--ds-subtext);">?</div>
      <h3 class="text-lg font-bold" style="color: var(--ds-text);">{{ i18n.translate('common.no_results') }}</h3>
      <p class="text-xs font-bold uppercase tracking-widest opacity-40 mt-1" style="color: var(--ds-subtext);">{{ i18n.translate('common.adjust_filters') }}</p>
    </div>
  }

</div>
