<div class="p-6 md:p-8 max-w-7xl mx-auto animate-in fade-in duration-700 relative z-10" style="background-color: var(--ds-bg);">
  
  <!-- Header -->
  <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div>
      <h1 class="text-2xl font-bold" style="color: var(--ds-text);">{{ i18n.translate('technicians.title') }}</h1>
      <p class="text-sm mt-0.5" style="color: var(--ds-subtext);">{{ i18n.translate('technicians.subtitle') }}</p>
    </div>
    
    <button 
      (click)="openModal()" 
      class="ds-btn-primary px-6 h-10 flex items-center gap-2 shadow-lg shadow-indigo-500/20"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
      </svg>
      {{ i18n.translate('technicians.new_tech') }}
    </button>
  </div>

  <!-- Table Container -->
  <div class="rounded-xl overflow-hidden" style="background-color: var(--ds-card); border: 1px solid var(--ds-border); box-shadow: 0 4px 20px var(--ds-shadow);">
    @if (loading()) {
      <div class="flex justify-center items-center py-24">
        <div class="ds-spinner"></div>
      </div>
    } @else {
      <app-technicians-table
        [technicians]="technicians()"
        (view)="openDetail($event)"
        (edit)="openModal($event)"
        (delete)="deleteTech($event)" />
    }
  </div>

</div>

<!-- Modal Form -->
@if (showModal()) {
  <app-dialog>
    <app-dialog-overlay (click)="showModal.set(false)" />
    <app-dialog-content (close)="showModal.set(false)" class="max-w-xl p-0 overflow-hidden" style="background-color: var(--ds-card); border: 1px solid var(--ds-border); border-radius: 1.5rem;">
      <div class="p-8">
        <app-dialog-header class="mb-6">
          <app-dialog-title class="text-xl font-bold" style="color: var(--ds-text);">
            {{ (selectedTech()) ? i18n.translate('technicians.edit_tech') : i18n.translate('technicians.new_tech_title') }}
          </app-dialog-title>
        </app-dialog-header>

        <app-technician-form
          [form]="form"
          [saving]="saving()"
          [isEditing]="!!selectedTech()"
          (save)="onSave()"
          (cancel)="showModal.set(false)">
        </app-technician-form>
      </div>
    </app-dialog-content>
  </app-dialog>
}

@if (showDetailModal()) {
  <app-technician-detail-modal
    [technician]="selectedTechDetail()"
    (close)="closeDetailModal()" />
}
