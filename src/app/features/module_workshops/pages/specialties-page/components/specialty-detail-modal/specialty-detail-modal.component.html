<div class="fixed inset-0 z-[80] bg-slate-950/60 backdrop-blur-xl transition-all" (click)="close.emit()"></div>

<div class="fixed left-1/2 top-[48%] z-[90] w-[calc(100%-2rem)] max-w-xl max-h-[calc(100vh-4rem)] -translate-x-1/2 -translate-y-1/2 overflow-y-auto bg-white/95 dark:bg-slate-900/90 backdrop-blur-3xl rounded-[2rem] border border-white/70 dark:border-slate-700/80 shadow-2xl shadow-slate-900/50 animate-in zoom-in-95 duration-300 custom-scrollbar">
  <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-indigo-500 via-cyan-500 to-emerald-500 opacity-90"></div>

  <button
    type="button"
    (click)="close.emit()"
    class="absolute right-5 top-5 rounded-full p-2 text-slate-500 hover:text-slate-900 bg-slate-100/70 dark:bg-slate-800/60 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-700 transition-all hover:rotate-90 hover:scale-110 z-10"
    [attr.aria-label]="i18n.translate('common.close')">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
    </svg>
  </button>

  @if (specialty(); as s) {
    <div class="px-8 pt-8 pb-4 border-b border-slate-200/60 dark:border-slate-800/70">
      <h2 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight flex items-center gap-3">
        <span class="p-2.5 bg-indigo-100 dark:bg-indigo-500/20 rounded-xl text-indigo-600 dark:text-indigo-400">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
        </span>
        {{ i18n.translate('workshops.specialty_detail_title') }}
      </h2>
      <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mt-3 pl-1">
        {{ i18n.translate('workshops.specialty_detail_subtitle') }}
      </p>
    </div>

    <div class="p-8 space-y-6">
      <div class="rounded-2xl border border-slate-200/70 dark:border-slate-700/70 bg-slate-50/70 dark:bg-slate-950/40 p-5">
        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">{{ i18n.translate('common.name') }}</span>
        <p class="mt-1 text-base font-bold text-slate-900 dark:text-white">{{ s.name }}</p>
      </div>

      <div class="rounded-2xl border border-slate-200/60 dark:border-slate-800/60 bg-white/60 dark:bg-slate-950/30 p-5">
        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">{{ i18n.translate('common.id') }}</span>
        <p class="mt-1 text-xs text-indigo-600 dark:text-indigo-400 font-semibold break-all">{{ s.id }}</p>
      </div>
    </div>
  }
</div>
