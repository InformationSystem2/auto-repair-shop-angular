<div class="fixed inset-0 z-[80] bg-black/60 backdrop-blur-sm transition-all animate-in fade-in duration-300" (click)="close.emit()"></div>

<div class="fixed left-1/2 top-1/2 z-[90] w-[calc(100%-2rem)] max-w-xl -translate-x-1/2 -translate-y-1/2 animate-in zoom-in-95 duration-300">
  <div class="ds-card overflow-hidden shadow-2xl shadow-black/50">
    <!-- Top accent line -->
    <div class="h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 opacity-80"></div>

    @if (specialty(); as s) {
      <!-- Header -->
      <div class="px-8 pt-8 pb-6 border-b border-white/5">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400">
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
              </svg>
            </div>
            <div>
              <h2 class="text-xl font-black tracking-tight" style="color:var(--ds-text)">
                {{ i18n.translate('workshops.specialty_detail_title') }}
              </h2>
              <p class="text-[10px] font-bold uppercase tracking-widest mt-0.5 opacity-50" style="color:var(--ds-subtext)">
                {{ i18n.translate('workshops.specialty_detail_subtitle') }}
              </p>
            </div>
          </div>
          <button (click)="close.emit()" class="p-2 rounded-full hover:bg-white/5 transition-colors opacity-30 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6 6 18" /><path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Body -->
      <div class="p-8 space-y-4">
        <div class="ds-surface p-6">
          <p class="text-[9px] font-bold uppercase tracking-widest opacity-40 mb-1" style="color:var(--ds-subtext)">{{ i18n.translate('common.name') }}</p>
          <div class="flex items-center gap-3">
             <span class="ds-live-dot"></span>
             <p class="text-xl font-black" style="color:var(--ds-text)">{{ s.name }}</p>
          </div>
        </div>

        <div class="ds-surface p-6">
          <p class="text-[9px] font-bold uppercase tracking-widest opacity-40 mb-1" style="color:var(--ds-subtext)">ID Identificador</p>
          <p class="text-xs font-mono opacity-50 break-all" style="color:var(--ds-text)">{{ s.id }}</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="p-8 border-t border-white/5">
        <button (click)="close.emit()" class="ds-btn-ghost w-full h-12 rounded-xl">
          {{ i18n.translate('common.close') }}
        </button>
      </div>
    }
  </div>
</div>
