<div class="relative w-full h-[calc(100vh-8rem)] min-h-[600px] flex overflow-hidden font-sans selection:bg-indigo-500/30 rounded-[2rem] border border-white/60 dark:border-slate-800/80 shadow-2xl shadow-indigo-900/5 dark:shadow-[0_0_50px_-15px_rgba(0,0,0,0.5)]">
  
  <!-- BACKGROUND DECORATIONS -->
  <div class="absolute inset-0 bg-white/40 dark:bg-slate-900/60 backdrop-blur-3xl z-0"></div>
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-500/15 dark:bg-indigo-500/10 blur-[100px] pointer-events-none z-1"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-rose-500/10 dark:bg-rose-500/5 blur-[100px] pointer-events-none z-1"></div>

  <!-- MAIN WRAPPER -->
  <div class="flex flex-1 gap-6 z-10 relative p-4 sm:p-6 w-full h-full">
    
    <!-- LEFT PANEL: INBOX LIST -->
    <div class="w-full sm:w-[400px] flex flex-col bg-white dark:bg-slate-800 rounded-[1.5rem] border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden transition-all relative z-[100]">
      <app-request-inbox class="block w-full h-full"
        [offers]="activeTab === 'new' ? offers : activeOffers"
        [selectedOffer]="selectedOffer"
        [isProcessing]="isProcessing"
        [activeTab]="activeTab"
        (select)="handleSelectOffer($event)"
        (refresh)="loadOffers()"
        (tabChange)="handleTabChange($event)">
      </app-request-inbox>
    </div>

    <!-- RIGHT PANEL: DETAILS & MAP -->
    <div class="flex-1 hidden sm:flex flex-col relative w-full h-full rounded-[1.5rem] overflow-hidden shadow-xl border border-white/50 dark:border-slate-700/50 bg-white/90 dark:bg-slate-800/90 backdrop-blur-3xl z-0">
      <app-request-details class="block w-full h-full"
        [selectedOffer]="selectedOffer"
        [isProcessing]="isProcessing"
        [activeTab]="activeTab"
        (accept)="handleAcceptOffer($event)"
        (reject)="handleRejectOffer($event)"
        (complete)="handleCompleteOffer()">
      </app-request-details>
    </div>
    
  </div>
</div>
