<div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-7xl mx-auto">
  
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div>
      <h1 class="text-3xl font-black tracking-tight" style="color:var(--ds-text)">
        {{ i18n.translate('users.title') }}
      </h1>
      <p class="text-xs font-bold tracking-widest uppercase mt-1" style="color:var(--ds-mauve)">
        {{ i18n.translate('users.subtitle') }}
      </p>
    </div>
    
    <button (click)="openCreate()" class="ds-btn-primary px-6 h-12 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
      </svg>
      <span class="font-bold uppercase tracking-widest text-[10px]">
        {{ i18n.translate('users.new_user') }}
      </span>
    </button>
  </div>

  <!-- Toolbar -->
  <app-users-toolbar
    [roles]="availableRoles()"
    (filterChange)="search.set($event.search); selectedRoleId.set($event.roleId)" />

  <!-- Table Container -->
  <div class="ds-card overflow-hidden mt-3">
    <div class="w-full">
      @if (loading()) {
        <div class="flex justify-center items-center py-24">
          <div class="ds-spinner"></div>
        </div>
      } @else {
        <app-users-table
          [users]="filtered()"
          (edit)="openEdit($event)"
          (delete)="confirmDelete($event)"
          (view)="onViewDetail($event)" />
      }
    </div>
  </div>

  <!-- Modal Form -->
  @if (showModal()) {
    <app-user-form
      [editingUser]="editingUser()"
      [availableRoles]="availableRoles()"
      [saving]="saving()"
      (save)="onSave($event)"
      (close)="closeModal()" />
  }

  @if (selectedUserForDetail()) {
    <app-user-detail-modal
      [userId]="selectedUserForDetail()?.id || null"
      (close)="selectedUserForDetail.set(null)" />
  }

  @if (selectedUserForDelete(); as user) {
    <app-alert-dialog
      [title]="i18n.translate('users.delete_user')"
      [description]="i18n.translate('users.delete_confirm', { name: user.name + ' ' + (user.last_name || '') })"
      [confirmText]="i18n.translate('common.delete')"
      (confirm)="onDeleteConfirm()"
      (cancel)="selectedUserForDelete.set(null)" />
  }
</div>
