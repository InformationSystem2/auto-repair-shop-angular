<div class="flex flex-col lg:flex-row gap-4 items-center w-full">
  <!-- Search Input -->
  <div class="relative w-full lg:flex-1">
    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-slate-500 z-10"
      fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input appInput type="text" placeholder="Buscar por nombre o email..."
      class="pl-12 h-11"
      [value]="currentSearch()"
      (input)="onSearch($any($event.target).value)" />
  </div>

  <!-- Role Filter -->
  <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest shrink-0 ml-1 sm:ml-0 self-start sm:self-center">Filtrar por:</span>
    <div class="relative w-full sm:w-auto">
      <select
        (change)="onRoleChange($any($event.target).value)"
        class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white text-sm rounded-md
               focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 dark:focus:ring-indigo-600 dark:focus:ring-offset-slate-950 py-2 pl-4 pr-10
               appearance-none cursor-pointer min-w-[180px] h-11 transition-all shadow-sm">
        <option value="all">Todos los Roles</option>
        @for (role of roles(); track role.id) {
          <option [value]="role.id">{{ role.name }}</option>
        }
      </select>
      <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>
</div>
