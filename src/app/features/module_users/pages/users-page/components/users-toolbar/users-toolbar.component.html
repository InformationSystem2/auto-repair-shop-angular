<div class="flex flex-col lg:flex-row gap-5 items-center w-full">
  <!-- Search Input -->
  <div class="relative w-full lg:flex-1 group">
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors z-10">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input appInput type="text" placeholder="Buscar por nombre o email..."
      class="pl-12 h-14 block w-full rounded-2xl border border-white/60 dark:border-slate-700/80 bg-white/70 dark:bg-slate-900/50 backdrop-blur-2xl px-4 py-3.5 text-sm text-slate-900 dark:text-slate-50 font-medium placeholder-slate-400 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300 shadow-sm"
      [value]="currentSearch()"
      (input)="onSearch($any($event.target).value)" />
  </div>

  <!-- Role Filter -->
  <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
    <span class="text-[0.65rem] font-bold text-slate-500 uppercase tracking-widest shrink-0 ml-1 sm:ml-0 self-start sm:self-center">Filtrar por:</span>
    <div class="relative w-full sm:w-auto hover:scale-[1.02] transition-transform duration-200">
      <select
        (change)="onRoleChange($any($event.target).value)"
        class="w-full bg-white/70 dark:bg-slate-900/50 backdrop-blur-2xl border border-white/60 dark:border-slate-700/80 text-slate-900 dark:text-white text-sm font-bold rounded-2xl
               focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 py-3.5 pl-5 pr-12
               appearance-none cursor-pointer min-w-[200px] h-14 transition-all duration-300 shadow-sm outline-none">
        <option value="all">Todos los Roles</option>
        @for (role of roles(); track role.id) {
          <option [value]="role.id">{{ role.name }}</option>
        }
      </select>
      <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none p-1 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-500">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>
</div>
