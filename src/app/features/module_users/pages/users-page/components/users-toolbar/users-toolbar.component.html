<div class="flex flex-col lg:flex-row gap-5 items-center w-full">
  <!-- Search Input -->
  <div class="relative w-full lg:flex-1 group">
    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-indigo-400/50 group-focus-within:text-indigo-400 transition-colors z-10">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input type="text" [placeholder]="i18n.translate('common.search') + '...'"
      class="ds-input pl-14 h-14"
      [value]="currentSearch()"
      (input)="onSearch($any($event.target).value)" />
  </div>

  <!-- Role Filter -->
  <div class="flex items-center gap-4 w-full lg:w-auto">
    <span class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40 whitespace-nowrap ml-2" style="color:var(--ds-subtext)">
       {{ i18n.translate('common.filter_by') }}
    </span>
    <div class="relative flex-1 lg:flex-none">
      <select
        (change)="onRoleChange($any($event.target).value)"
        class="ds-input py-0 pl-6 pr-12 h-14 appearance-none cursor-pointer min-w-[200px]">
        <option value="all">{{ i18n.translate('common.all_roles') }}</option>
        @for (role of roles(); track role.id) {
          <option [value]="role.id">{{ role.name }}</option>
        }
      </select>
      <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-indigo-400/50">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>
</div>
