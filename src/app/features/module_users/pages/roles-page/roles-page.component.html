<div class="space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700 max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 tracking-tight">Roles</h1>
      <p class="text-indigo-600 dark:text-indigo-400 font-bold tracking-wide mt-2 text-sm uppercase">{{ i18n.translate('roles.description') }}</p>
    </div>
    
    <button appButton (click)="openCreate()" 
            class="relative inline-flex items-center justify-center px-6 py-3 text-sm font-bold text-white transition-all duration-300 bg-indigo-600 rounded-2xl hover:bg-indigo-500 hover:shadow-lg hover:shadow-indigo-500/40 hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 overflow-hidden group border-0">
      <div class="absolute inset-0 w-0 bg-white/20 transition-all duration-[300ms] ease-out group-hover:w-full"></div>
      <span class="relative flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
        </svg>
        Nuevo rol
      </span>
    </button>
  </div>

  <!-- Table Container -->
  <app-card class="flex bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/60 dark:border-slate-800/80 rounded-[2rem] shadow-xl shadow-slate-200/40 dark:shadow-none min-h-[400px] overflow-hidden p-0">
    <div class="w-full">
      @if (loading()) {
        <div class="flex justify-center items-center py-24">
          <svg class="animate-spin w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </div>
      }
      @else if (roles().length > 0) {
        <app-roles-table
          [roles]="roles()"
          (edit)="openEdit($event)"
          (delete)="confirmDelete($event)"
          (view)="onViewDetail($event)" />
      }
    </div>
  </app-card>

  <!-- Modal Form -->
  @if (showModal()) {
    <app-role-form
      [editingRole]="editingRole()"
      [allPermissions]="allPermissions()"
      [saving]="saving()"
      (save)="onSave($event)"
      (close)="closeModal()" />
  }

  @if (selectedRoleForDetail()) {
    <app-role-detail-modal
      [roleId]="selectedRoleForDetail()?.id || null"
      (close)="selectedRoleForDetail.set(null)" />
  }
</div>
