<div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-7xl mx-auto">
  
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div>
      <h1 class="text-3xl font-black tracking-tight" style="color:var(--ds-text)">
        {{ i18n.translate('roles.title') }}
      </h1>
      <p class="text-xs font-bold tracking-widest uppercase mt-1" style="color:var(--ds-mauve)">
        {{ i18n.translate('roles.description') }}
      </p>
    </div>
    
    <button (click)="openCreate()" class="ds-btn-primary px-6 h-12 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
      </svg>
      <span class="font-bold uppercase tracking-widest text-[10px]">
        {{ i18n.translate('roles.new_role') }}
      </span>
    </button>
  </div>

  <!-- Table Container -->
  <div class="ds-card overflow-hidden">
    <div class="w-full">
      @if (loading()) {
        <div class="flex justify-center items-center py-24">
          <svg class="animate-spin w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </div>
      }
      @else if (roles().length > 0) {
        <app-roles-table
          [roles]="roles()"
          (edit)="openEdit($event)"
          (delete)="confirmDelete($event)"
          (view)="onViewDetail($event)" />
      }
    </div>
  </div>

  <!-- Modal Form -->
  @if (showModal()) {
    <app-role-form
      [editingRole]="editingRole()"
      [allPermissions]="allPermissions()"
      [saving]="saving()"
      (save)="onSave($event)"
      (close)="closeModal()" />
  }

  @if (selectedRoleForDetail()) {
    <app-role-detail-modal
      [roleId]="selectedRoleForDetail()?.id || null"
      (close)="selectedRoleForDetail.set(null)" />
  }
</div>
