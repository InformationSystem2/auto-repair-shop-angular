<div class="bg-white/90 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 rounded-xl p-5 relative overflow-hidden group shadow-sm dark:shadow-none">
  <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl group-hover:opacity-80 transition-all"
       [class]="colorClass()"></div>
  
  <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">{{ label() }}</p>
  <p class="text-2xl font-bold text-slate-900 dark:text-white">{{ value() }}</p>
  
  @if (trend(); as t) {
    <div class="mt-4 flex items-center text-xs font-medium" 
         [class]="t.positive ? 'text-emerald-400' : 'text-rose-400'">
      @if (t.positive) {
        <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      } @else {
        <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" />
        </svg>
      }
      {{ t.text }}
    </div>
  }
</div>
