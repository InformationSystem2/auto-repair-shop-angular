<div class="h-full rounded-[2rem] p-6 relative overflow-hidden group shadow-xl transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 flex flex-col justify-between" style="background-color: var(--ds-card); border: 1px solid var(--ds-border); box-shadow: 0 4px 20px var(--ds-shadow);">
  <div class="absolute -right-8 -top-8 w-32 h-32 rounded-full blur-3xl opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500"
       [class]="colorClass()"></div>
  
  <p class="text-sm font-bold tracking-wide uppercase mb-1" style="color: var(--ds-subtext);">{{ label() }}</p>
  <p class="text-4xl font-black relative z-10" style="color: var(--ds-text);">{{ value() }}</p>
  
  @if (trend(); as t) {
    <div class="mt-5 flex items-center text-xs font-bold px-3 py-1.5 rounded-full inline-flex w-fit backdrop-blur-md border" 
         [class]="t.positive ? 'text-emerald-600 bg-emerald-50 border-emerald-100 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20' : 'text-rose-600 bg-rose-50 border-rose-100 dark:bg-rose-500/10 dark:text-rose-400 dark:border-rose-500/20'">
      @if (t.positive) {
        <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      } @else {
        <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" />
        </svg>
      }
      {{ t.text }}
    </div>
  }
</div>
