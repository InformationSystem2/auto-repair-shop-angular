<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">{{ i18n.translate('dashboard.workshop.title') }}</h1>
    <p class="text-slate-600 dark:text-slate-400 text-sm mt-0.5">{{ i18n.translate('dashboard.workshop.subtitle', { name: auth.currentUserName() ?? 'Usuario' }) }}</p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <app-stat-card
      [label]="i18n.translate('dashboard.workshop.active_services')"
      value="12"
      colorClass="bg-indigo-500/10 group-hover:bg-indigo-500/20" />
    <app-stat-card
      [label]="i18n.translate('dashboard.workshop.completed_today')"
      value="4"
      colorClass="bg-emerald-500/10 group-hover:bg-emerald-500/20" />
    <app-stat-card
      [label]="i18n.translate('dashboard.workshop.available_mechanics')"
      value="3/5"
      colorClass="bg-cyan-500/10 group-hover:bg-cyan-500/20" />
  </div>
  <div class="bg-white/90 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 rounded-xl p-5 min-h-[280px] flex items-center justify-center shadow-sm dark:shadow-none">
    <p class="text-slate-500 dark:text-slate-500 flex flex-col items-center gap-2 text-center px-4">
      <svg class="w-8 h-8 opacity-50 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
      <span class="font-medium">{{ i18n.translate('dashboard.workshop.work_queue') }}</span>
      <span class="text-xs text-slate-500 dark:text-slate-600 uppercase tracking-widest mt-1">{{ i18n.translate('dashboard.workshop.pending_api') }}</span>
    </p>
  </div>
</div>
