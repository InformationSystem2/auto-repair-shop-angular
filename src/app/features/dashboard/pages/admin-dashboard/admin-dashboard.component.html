<div class="space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700 max-w-7xl mx-auto">
  <div class="mb-6">
    <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 tracking-tight">Dashboard Administrativo</h1>
    <p class="text-indigo-600 dark:text-indigo-400 font-bold tracking-wide mt-2 text-sm uppercase">Visión global de la plataforma</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <app-stat-card
      label="Talleres Activos"
      value="124"
      colorClass="bg-indigo-500"
      [trend]="{ text: '+12% este mes', positive: true }" />

    <app-stat-card
      label="Usuarios Totales"
      value="8,432"
      colorClass="bg-cyan-500"
      [trend]="{ text: '+5% este mes', positive: true }" />

    <app-stat-card
      label="Incidentes Hoy"
      value="45"
      colorClass="bg-amber-500"
      [trend]="{ text: 'Estable', positive: true }" />

    <app-stat-card
      label="Alertas Críticas"
      value="2"
      colorClass="bg-rose-500" />
  </div>

  <!-- Placeholder content for charts/tables -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/60 dark:border-slate-800/80 rounded-[2rem] p-8 min-h-[400px] flex items-center justify-center shadow-xl shadow-slate-200/40 dark:shadow-none hover:shadow-2xl transition-all duration-300 relative overflow-hidden group">
      <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
      <div class="text-slate-400 dark:text-slate-500 flex flex-col items-center gap-3 text-center px-4 relative z-10">
        <div class="p-6 rounded-full bg-slate-100 dark:bg-slate-800/50 mb-2">
          <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        </div>
        <span class="font-bold text-lg text-slate-700 dark:text-slate-300">Gráfico de actividad</span>
        <span class="text-xs font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest bg-indigo-50 dark:bg-indigo-500/10 px-3 py-1 rounded-full border border-indigo-100 dark:border-indigo-500/20">Pendiente de API</span>
      </div>
    </div>
    
    <div class="bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/60 dark:border-slate-800/80 rounded-[2rem] p-8 min-h-[400px] flex items-center justify-center shadow-xl shadow-slate-200/40 dark:shadow-none hover:shadow-2xl transition-all duration-300 relative overflow-hidden group">
      <div class="absolute inset-0 bg-gradient-to-bl from-purple-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
      <div class="text-slate-400 dark:text-slate-500 flex flex-col items-center gap-3 text-center px-4 relative z-10">
        <div class="p-6 rounded-full bg-slate-100 dark:bg-slate-800/50 mb-2">
          <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <span class="font-bold text-lg text-slate-700 dark:text-slate-300">Actividad reciente</span>
        <span class="text-xs font-bold text-purple-500 dark:text-purple-400 uppercase tracking-widest bg-purple-50 dark:bg-purple-500/10 px-3 py-1 rounded-full border border-purple-100 dark:border-purple-500/20">Pendiente de API</span>
      </div>
    </div>
  </div>
</div>
