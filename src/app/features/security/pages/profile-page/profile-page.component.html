<div class="max-w-4xl mx-auto space-y-10 py-6 animate-in fade-in slide-in-from-bottom-8 duration-700 ease-out fill-mode-both">

  <div class="flex items-center justify-between mb-4">
    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{{ i18n.translate('profile.title') }}</h1>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <svg class="animate-spin w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>
  }

  @if (user(); as u) {
    <!-- Header stays always visible -->
    <app-profile-header [user]="u" />

    <!-- Edit Form -->
    <app-profile-edit-form
      [user]="u"
      [saving]="saving()"
      (save)="onSave($event)"
    />
  }
</div>
