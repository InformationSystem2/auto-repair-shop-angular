<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style="background-color: var(--ds-bg);">
  
  <!-- Background Glows (Dashboard Style) -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full blur-[120px] opacity-30" style="background-color: var(--ds-mauve);"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full blur-[120px] opacity-20" style="background-color: var(--ds-blue);"></div>
  </div>

  <div class="relative w-full max-w-sm animate-in fade-in zoom-in-95 duration-1000">
    
    <!-- Brand Section -->
    <div class="flex flex-col items-center mb-10 text-center">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative group" 
           style="background: linear-gradient(135deg, var(--ds-mauve) 0%, var(--ds-blue) 100%); box-shadow: 0 0 40px rgba(187, 154, 247, 0.3);">
        <div class="absolute inset-0 rounded-2xl blur-lg opacity-40 group-hover:opacity-60 transition-opacity" style="background: inherit;"></div>
        <svg class="w-8 h-8 text-white relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      
      <h1 class="text-3xl font-black tracking-tighter" style="color: var(--ds-text);">
        {{ i18n.translate('nav.app_name') }} <span style="color: var(--ds-blue);">{{ i18n.translate('nav.app_subtitle') }}</span>
      </h1>
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] mt-3 opacity-60" style="color: var(--ds-subtext);">
        {{ i18n.translate('login.subtitle') }}
      </p>
    </div>

    <!-- Main Card (Tokyo Night Style) -->
    <div class="rounded-[2rem] p-8 md:p-10 border border-white/20 relative overflow-hidden shadow-2xl backdrop-blur-xl" 
         style="background-color: var(--ds-card); box-shadow: 0 25px 50px -12px var(--ds-shadow), inset 0 0 0 1px rgba(255,255,255,0.1);">
      
      <div class="absolute top-0 left-0 right-0 h-1.5 opacity-40" style="background: linear-gradient(90deg, var(--ds-mauve), var(--ds-blue));"></div>

      <h2 class="text-lg font-bold mb-8 flex items-center gap-2" style="color: var(--ds-text);">
        <span class="w-1.5 h-1.5 rounded-full" style="background-color: var(--ds-mauve);"></span>
        {{ i18n.translate('login.sign_in') }}
      </h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Username -->
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest ml-1" style="color: var(--ds-subtext);">
            {{ i18n.translate('login.username') }}
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-white" style="color: var(--ds-overlay0);">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <input
              formControlName="username"
              type="text"
              [placeholder]="i18n.translate('login.username_placeholder')"
              class="w-full h-12 rounded-xl border pl-11 pr-4 text-sm font-medium outline-none transition-all placeholder:opacity-30"
              style="background-color: var(--ds-card-hi); border-color: var(--ds-border-sub); color: var(--ds-text);" />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest ml-1" style="color: var(--ds-subtext);">
            {{ i18n.translate('login.password') }}
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-white" style="color: var(--ds-overlay0);">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input
              formControlName="password"
              [type]="hidePassword() ? 'password' : 'text'"
              placeholder="••••••••"
              class="w-full h-12 rounded-xl border pl-11 pr-12 text-sm font-medium outline-none transition-all placeholder:opacity-30"
              style="background-color: var(--ds-card-hi); border-color: var(--ds-border-sub); color: var(--ds-text);" />
            
            <button
              type="button"
              (click)="hidePassword.set(!hidePassword())"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-colors hover:bg-white/5"
              style="color: var(--ds-overlay0);">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" [attr.d]="hidePassword() ? 'M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z' : 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057-5.064-7 9.542-7 1.253 0 2.426.276 3.483.771M11.35 11.35a3 3 0 014.3 4.3m3.303-3.303a9.945 9.945 0 011.892 4.253M3 3l18 18'" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Error Message -->
        @if (error()) {
          <div class="p-3 rounded-lg border text-xs font-bold flex items-center gap-3 animate-in fade-in slide-in-from-top-1"
               style="background-color: rgba(247, 118, 142, 0.1); border-color: rgba(247, 118, 142, 0.2); color: var(--ds-red);">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            {{ error() }}
          </div>
        }

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full h-12 rounded-xl text-sm font-black uppercase tracking-widest text-white transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed group relative overflow-hidden"
          style="background-color: var(--ds-mauve);">
          <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <span class="relative z-10 flex items-center justify-center gap-2">
            @if (loading()) {
              <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              {{ i18n.translate('login.entering') }}
            } @else {
              {{ i18n.translate('login.sign_in') }}
              <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            }
          </span>
        </button>

        <!-- Footer Links -->
        <div class="pt-6 text-center border-t border-dashed" style="border-color: var(--ds-border-sub);">
          <p class="text-xs font-bold" style="color: var(--ds-subtext);">
            {{ i18n.translate('login.workshop_owner_question') }}
            <a routerLink="/register-workshop" 
               class="ml-1 transition-colors hover:underline" style="color: var(--ds-blue);">
              {{ i18n.translate('login.register_here') }}
            </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
