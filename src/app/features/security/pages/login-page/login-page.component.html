<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 relative overflow-hidden transition-colors duration-500">

  <!-- Background glow -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-32 -left-32 w-[30rem] h-[30rem] bg-indigo-500/20 dark:bg-indigo-600/30 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute -bottom-32 -right-32 w-[30rem] h-[30rem] bg-cyan-400/20 dark:bg-cyan-500/20 rounded-full blur-[100px] animate-pulse" style="animation-delay: 1s;"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-sm mx-4 animate-in fade-in zoom-in-95 duration-700">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="flex items-center justify-center w-16 h-16 rounded-[1.5rem]
                  bg-gradient-to-br from-indigo-500 to-cyan-400
                  shadow-xl shadow-indigo-500/40 mb-5 relative group cursor-default">
        <div class="absolute inset-0 bg-white/20 rounded-[1.5rem] opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <svg class="w-8 h-8 text-white relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-300 tracking-tight text-center">Auxilio Mecánico</h1>
      <p class="text-indigo-600 dark:text-indigo-400 font-bold tracking-wide mt-2 text-[0.75rem] uppercase">Plataforma de gestión vehicular</p>
    </div>

    <!-- Form card -->
    <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-3xl border border-white/60 dark:border-slate-800/80 rounded-[2rem] p-8
                shadow-2xl shadow-slate-200/50 dark:shadow-[0_0_50px_-15px_rgba(0,0,0,0.7)] relative overflow-hidden">
                
      <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-indigo-500 via-purple-500 to-cyan-500 opacity-90"></div>

      <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
        Iniciar Sesión
      </h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Username -->
        <div class="space-y-1.5 group">
          <label class="block text-[0.75rem] font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider ml-1 group-focus-within:text-indigo-600 dark:group-focus-within:text-indigo-400 transition-colors">
            Usuario
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors z-10">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <input
              formControlName="username"
              type="text"
              placeholder="Tu nombre de usuario"
              autocomplete="username"
              class="h-12 w-full rounded-2xl border border-white/60 dark:border-slate-700/80 bg-white/70 dark:bg-slate-900/50 backdrop-blur-2xl pl-11 pr-4 py-3 text-sm text-slate-900 dark:text-slate-50 font-medium placeholder-slate-400 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all shadow-sm" />
          </div>
          @if (hasError('username', 'required')) {
            <p class="text-rose-500 text-xs font-bold pl-1">El usuario es obligatorio.</p>
          }
        </div>

        <!-- Password -->
        <div class="space-y-1.5 group">
          <label class="block text-[0.75rem] font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider ml-1 group-focus-within:text-indigo-600 dark:group-focus-within:text-indigo-400 transition-colors">
            Contraseña
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors z-10">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input
              formControlName="password"
              [type]="hidePassword() ? 'password' : 'text'"
              placeholder="••••••••"
              autocomplete="current-password"
              class="h-12 w-full rounded-2xl border border-white/60 dark:border-slate-700/80 bg-white/70 dark:bg-slate-900/50 backdrop-blur-2xl pl-11 pr-12 py-3 text-sm text-slate-900 dark:text-slate-50 font-medium placeholder-slate-400 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all shadow-sm" />

            <!-- Toggle Password Visibility -->
            <button
              type="button"
              (click)="hidePassword.set(!hidePassword())"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400
                     transition-colors focus:outline-none bg-slate-100 dark:bg-slate-800 rounded-lg"
              [attr.aria-label]="hidePassword() ? 'Mostrar contraseña' : 'Ocultar contraseña'">
              @if (hidePassword()) {
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              } @else {
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.253 0 2.426.276 3.483.771M11.35 11.35a3 3 0 014.3 4.3m3.303-3.303a9.945 9.945 0 011.892 4.253M3 3l18 18" />
                </svg>
              }
            </button>
          </div>
          @if (hasError('password', 'required')) {
            <p class="text-rose-500 text-xs font-bold pl-1">La contraseña es obligatoria.</p>
          }
        </div>

        <!-- Error -->
        @if (error()) {
          <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-rose-50 border border-rose-100 dark:bg-rose-500/10 dark:border-rose-500/20 animate-in fade-in slide-in-from-top-2">
            <svg class="w-5 h-5 text-rose-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-rose-600 dark:text-rose-400 text-sm font-bold">{{ error() }}</p>
          </div>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full relative inline-flex items-center justify-center h-12 px-8 mt-2 text-sm font-bold text-white transition-all duration-300 bg-indigo-600 rounded-xl hover:bg-indigo-500 hover:shadow-lg hover:shadow-indigo-500/40 hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-none disabled:cursor-not-allowed overflow-hidden group">
          <div class="absolute inset-0 w-0 bg-white/20 transition-all duration-[300ms] ease-out group-hover:w-full"></div>
          <span class="relative flex items-center gap-2">
            @if (loading()) {
              <svg class="animate-spin w-4.5 h-4.5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Ingresando…
            } @else {
              Iniciar Sesión
              <svg class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            }
          </span>
        </button>
      </form>
    </div>
  </div>
</div>
