<div class="min-h-screen flex items-center justify-center bg-slate-950 relative overflow-hidden">

  <!-- Background glow -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-sm mx-4">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center justify-center w-14 h-14 rounded-2xl
                  bg-gradient-to-br from-indigo-500 to-cyan-400
                  shadow-xl shadow-indigo-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Auxilio Mecánico</h1>
      <p class="text-slate-400 text-sm mt-1">Plataforma de gestión vehicular</p>
    </div>

    <!-- Form card -->
    <div class="bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-2xl p-8
                shadow-2xl shadow-black/40">

      <h2 class="text-lg font-semibold text-white mb-6">Iniciar sesión</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">
            Usuario
          </label>
          <input
            formControlName="username"
            type="text"
            placeholder="Tu nombre de usuario"
            autocomplete="username"
            class="w-full px-4 py-2.5 rounded-xl bg-slate-800/60 border border-slate-600/50 text-white
                   placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50
                   focus:border-indigo-500 transition-all text-sm" />
          @if (hasError('username', 'required')) {
            <p class="text-red-400 text-xs mt-1">El usuario es obligatorio.</p>
          }
        </div>

        <!-- Password -->
        <div class="relative">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">
            Contraseña
          </label>
          <div class="relative">
            <input
              formControlName="password"
              [type]="hidePassword() ? 'password' : 'text'"
              placeholder="••••••••"
              autocomplete="current-password"
              class="w-full pl-4 pr-12 py-2.5 rounded-xl bg-slate-800/60 border border-slate-600/50 text-white
                     placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50
                     focus:border-indigo-500 transition-all text-sm" />

            <!-- Toggle Password Visibility -->
            <button
              type="button"
              (click)="hidePassword.set(!hidePassword())"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-white
                     transition-colors focus:outline-none"
              [attr.aria-label]="hidePassword() ? 'Mostrar contraseña' : 'Ocultar contraseña'">
              @if (hidePassword()) {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.253 0 2.426.276 3.483.771M11.35 11.35a3 3 0 014.3 4.3m3.303-3.303a9.945 9.945 0 011.892 4.253M3 3l18 18" />
                </svg>
              }
            </button>
          </div>
          @if (hasError('password', 'required')) {
            <p class="text-red-400 text-xs mt-1">La contraseña es obligatoria.</p>
          }
        </div>

        <!-- Error -->
        @if (error()) {
          <div class="flex items-center gap-2 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30">
            <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-red-400 text-sm">{{ error() }}</p>
          </div>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-2.5 px-4 rounded-xl font-semibold text-sm text-white
                 bg-gradient-to-r from-indigo-600 to-indigo-500
                 hover:from-indigo-500 hover:to-cyan-500
                 disabled:opacity-50 disabled:cursor-not-allowed
                 shadow-lg shadow-indigo-500/20 transition-all duration-200
                 active:scale-[0.98]">
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Ingresando…
            </span>
          } @else {
            Ingresar
          }
        </button>
      </form>
    </div>
  </div>
</div>
