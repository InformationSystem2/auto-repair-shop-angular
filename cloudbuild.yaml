steps:
  # Construir la imagen Docker usando el Dockerfile.deploy
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/github.com/informationsystem2/auto-repair-shop-angular:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile.deploy'
      - '.'

  # Subir la imagen a Artifact Registry (gcr.io)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/github.com/informationsystem2/auto-repair-shop-angular:$COMMIT_SHA'

  # Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'auto-repair-shop-angular'      # Nombre de tu servicio en Cloud Run
      - '--image'
      - 'gcr.io/$PROJECT_ID/github.com/informationsystem2/auto-repair-shop-angular:$COMMIT_SHA'
      - '--region'
      - 'southamerica-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'       # Si quieres acceso público
      - '--quiet'

# La imagen resultante se registrará como salida
images:
  - 'gcr.io/$PROJECT_ID/github.com/informationsystem2/auto-repair-shop-angular:$COMMIT_SHA'
